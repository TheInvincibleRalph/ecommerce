name: Build, Push, and Update GitOps

on:
  push:
    branches:
      - master

# Required for AWS OIDC authentication
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: core-monolith
  ECR_DB_REPOSITORY: database 
  GITOPS_REPO: github.com/TheInvincibleRalph/ecommerce-gitops.git 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::681504525746:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }} 
        run: |
          # 1. Build and Push the PHP Monolith
          docker build -f ./docker/application/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # 2. Build and Push the MySQL Database
          docker build -f ./docker/database/Dockerfile -t $ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: TheInvincibleRalph/ecommerce-gitops
          token: ${{ secrets.GITOPS_PAT }} 
          path: gitops-repo

      - name: Update Kubernetes Manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd gitops-repo
          
          # Update the Monolith Deployment
          sed -i "s|image: .*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" apps/core/deployment.yaml
          
          # Update the Database StatefulSet
          sed -i "s|image: .*|image: $ECR_REGISTRY/$ECR_DB_REPOSITORY:$IMAGE_TAG|g" apps/database/statefulset.yaml
          
          # Commit and push both files back to GitHub
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add apps/core/deployment.yaml apps/core/database/statefulset.yaml
          git commit -m "chore: auto-update application and database images to $IMAGE_TAG"
          git push